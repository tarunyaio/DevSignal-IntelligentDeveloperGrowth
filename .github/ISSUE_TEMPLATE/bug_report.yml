name: "🐛 Bug Report"
description: "Found a bug in DevSignal? Help us fix it."
labels: ["bug", "intelligence-loss"]
body:
  - type: markdown
    attributes:
      value: |
        ### "Growth is only possible if we acknowledge the faults."
        Please provide as much detail as possible to help us squash this bug.
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: What happened and what did you expect to happen?
      placeholder: "e.g., The sync button spins forever but never completes."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we see the bug ourselves?
      placeholder: |
        1. Go to '/dashboard'
        2. Click on 'Manual Sync'
        3. Observe the infinite loading state
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Details
      description: Browser, OS, Node version?
      placeholder: Chrome 120, macOS Sonoma, Node 20.x
  - type: textarea
    id: logs
    attributes:
      label: Logs/Screenshots
      description: Paste any console logs or drag-and-drop screenshots here.
